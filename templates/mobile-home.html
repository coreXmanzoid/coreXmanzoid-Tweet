<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatFlick</title>

    <link rel="shortcut icon" href="{{ url_for('static', filename='assets/logo.png') }}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body data-current-user-id="{{ current_user.id }}">
    {% if not is_user_verified %}
    <div class="verification-overlay">
        <div class="verification-box">
            <h2>Email Verification Required</h2>
            <p>Please verify your email to access all features.</p>
            <button id="verifyBtn">Send Verification Email</button>
        </div>
    </div>
    {% endif %}

    <div class="app-shell">
        <div class="fullpost-overlay" hidden>
            <div class="fullpost-box"></div>
        </div>

        <main class="feed-preview">
            <div class="status-row">
                <img src="{{ url_for('static', filename='assets/Logo_horizontal.png') }}" class="img-fluid"
                    alt="ChatFlick">
                <span id="notification-icon"><i class="fa-solid fa-bell"></i></span>
            </div>

            <section class="post-section">
                <div class="loader-wrapper"><span class="loader"></span></div>
            </section>

            <div class="accounts-row">
                <!-- show some accounts just like explorer -->
                <!-- Add background profile with low visibility-->
                {% for account in accounts %}
                <button class="account" type="button" data-accountid="{{ account.id }}"
                    aria-label="Open {{ account.username }} profile">
                    <img src="{{ account.profile_image_url if account.profile_image_url else none }}"
                        alt="">
                    {% if account.username | length > 10 %}
                    <span style="font-size: 0.45rem;">{{ account.username }}</span>
                    {% else %}
                    <span>{{ account.username }}</span>
                    {% endif %}
                </button>
                {% endfor %}
            </div>
            
            <section id="feed-post">
                <div class="loader-wrapper"><span class="loader"></span></div>
            </section>
        </main>

        <nav class="navigation">
            <div class="more-menu-overlay" hidden>
                <a href="{{ url_for('setting.setting_index') }}" class="more-menu-item">
                    <i class="fa-solid fa-gear"></i>
                    <span>Setting</span>
                </a>
                <a href="{{ url_for('main.about') }}" class="more-menu-item">
                    <i class="fa-solid fa-circle-info"></i>
                    <span>About us</span>
                </a>
                <a href="{{ url_for('main.terms_of_service') }}" class="more-menu-item">
                    <i class="fa-solid fa-file-contract"></i>
                    <span>Terms &amp; condition</span>
                </a>
                <button class="more-menu-item" type="button" data-more-action="liked">
                    <i class="fa-solid fa-heart"></i>
                    <span>Liked post</span>
                </button>
                
                <a href="{{ url_for('account.logout', st=1) }}" class="more-menu-item">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
                <button class="more-menu-item" type="button" data-more-action="switch">
                    <i class="fa-solid fa-repeat"></i>
                    <span>Switch account</span>
                </button>
                <a href="{{ url_for('setting.setting', section='support') }}" class="more-menu-item">
                    <i class="fa-solid fa-circle-question"></i>
                    <span>Help</span>
                </a>
            </div>
            <ul>
                <li class="list active">
                    <a href="#">
                        <span class="icon"><i class="fa-solid fa-house"></i></span>
                        <span class="text">Home</span>
                    </a>
                </li>
                <li class="list">
                    <a href="#">
                        <span class="icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                        <span class="text">Search</span>
                    </a>
                </li>
                <li class="list">
                    <a href="#">
                        <span class="icon"><i class="fa-regular fa-square-plus"></i></span>
                        <span class="text">More</span>
                    </a>
                </li>
                <li class="list">
                    <a href="#">
                        <span class="icon"><i class="fa-solid fa-robot"></i></span>
                        <span class="text">AI</span>
                    </a>
                </li>
                <li class="list">
                    <a href="#">
                        <span class="icon"><i class="fa-solid fa-user"></i></span>
                        <span class="text">Profile</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
        window.firebaseRuntimeConfig = {
            firebaseEnabled: {{ firebase_enabled | default(false) | tojson }},
            vapidKey: {{ fcm_vapid_key | default('') | tojson }},
            firebaseConfig: {
                apiKey: "{{ firebase_api_key | default('') }}",
                authDomain: "corexmanzoid-twitter-7a86a.firebaseapp.com",
                projectId: "corexmanzoid-twitter-7a86a",
                storageBucket: "corexmanzoid-twitter-7a86a.firebasestorage.app",
                messagingSenderId: "266928901713",
                appId: "1:266928901713:web:b092a1071e9467deccf270",
                measurementId: "G-5BXH7TMB3S"
            }
        };
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>
    <script src="{{ url_for('static', filename='js/firebase.js') }}?v=2026-05-01-1"></script>
    <script src="{{ url_for('static', filename='js/mobile-home.js') }}?v=2026-05-01-1"></script>
</body>

</html>
