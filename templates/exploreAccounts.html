{% if accounts|length == 0 %}
<div class="no-data text-center py-3 fs-6">No accounts exist</div>
{% endif %}
{% for account in accounts %}
<div class="full-account">
    <div class="post-heading">
        <img src="{{ account.profile_image_url if account.profile_image_url else url_for('static', filename='assets/default-profile.jpg') }}"
            alt="" width="50" height="50" class="rounded-circle me-2">
        <h5 data-accountid="{{account.id}}">{{ account.name }}<br /><span>@{{ account.username }}</span></h5>
        <strong>{{account.followers | length}} Followers</strong>
    </div>
    <div class="follow">
        {% if account.id in following %}
        <button>Following</button>
        {% else %}
        <button>Follow</button>
        {% endif %}
    </div>
</div>
{% endfor %}
<script>
    $(".post-heading").click(function () {
        var accountId = $(this).find('h5').data('accountid');
        showProfile(accountId);
    });
    $('.follow button').click(function () {
        var button = $(this);
        var accountId = button.closest('.full-account').find('h5').data('accountid');
        if (button.text() === 'Follow') {
            button.text('Following');
            $.ajax({
                url: '/follows/' + accountId + '/1',
                type: 'POST',
                success: function (response) {

                    sendNotification({
                        recipientId: accountId,
                        title: "New Follower",
                        type: "new_follower",
                        identifier: response.follower_id, // to prevent duplicate notifications for same follower
                        message: response.follower_name + " started following you.",
                        Push: "true",
                        state: 3, // create notification if not or update and send push.
                    }).done(function (res) {
                        console.log("Notification sent:", res);
                    }).fail(function (err) {
                        console.error("Failed to send notification:", err);
                    });
                    if (response.followersCount == 100 || response.followersCount == 1000 || response.followersCount == 10000) {
                        sendNotification({
                            recipientId: accountId,
                            title: (response.followersCount / 1000) + "K Followers Reached",
                            type: "follower_milestone",
                            identifier: accountId,
                            message: "Congratulations! You've reached " + (response.followersCount / 1000) + "K followers.",
                            Push: "true",
                            state: 3
                        }).done(function (res) {
                            console.log("Milestone notification sent:", res);
                        }).fail(function (err) {
                            console.error("Failed to send milestone notification:", err);
                        });
                    }
                }, error: function (xhr, status, error) {
                    console.error("Error following account:", error);
                    button.text('Follow'); // Revert button text on error
                }
            });
        } else {
            button.text('Follow');
            $.ajax({
                url: '/follows/' + accountId + '/2',
                type: 'POST',
                success: function (response) {
                }, error: function (xhr, status, error) {
                    console.error("Error unfollowing account:", error);
                    button.text('Following'); // Revert button text on error
                }
            });
        }
    });
    user_id = $(".div1").attr("class").split(" ")[1];
    checkForNotifications(user_id);
</script>
<style>
    .follow button {
        font-size: 14px;
        width: 80px !important;
    }
</style>
